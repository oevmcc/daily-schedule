<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f6e56" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Day" />
<title>My Day</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css" />
<link rel="manifest" href="manifest.json" />
<style>
  :root{
    --bg:#f5f4ef; --card:#ffffff; --ink:#23231f; --muted:#6b6a64; --line:rgba(0,0,0,.08);
    --health:#0f6e56; --health-bg:#e1f5ee;
    --logi:#185fa5;  --logi-bg:#e6f1fb;
    --work:#854f0b;  --work-bg:#faeeda;
    --rest:#5f5e5a;  --rest-bg:#f1efe8;
    --care:#993556;  --care-bg:#fbeaf0;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1a1a18; --card:#262522; --ink:#ededea; --muted:#a3a29c; --line:rgba(255,255,255,.10);
      --health:#5dcaa5; --health-bg:#0f3e33;
      --logi:#85b7eb;  --logi-bg:#0c365a;
      --work:#efb05a;  --work-bg:#4a3208;
      --rest:#b4b2a9;  --rest-bg:#33322d;
      --care:#ed93b1;  --care-bg:#4b1528;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 32px)}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px}
  header{margin:8px 4px 10px}
  .eyebrow{font-size:13px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:0}
  h1{font-size:26px;font-weight:600;margin:4px 0 2px}
  .clock{font-size:13px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
  .tabs{display:flex;gap:6px;margin:12px 4px 14px}
  .tabs button{flex:1;padding:9px;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:10px;font-size:13px;cursor:pointer}
  .tabs button.active{background:var(--health-bg);color:var(--health);border-color:transparent;font-weight:600}
  .leg{display:flex;flex-wrap:wrap;gap:12px;margin:0 4px 6px;font-size:12.5px;color:var(--muted)}
  .leg span{display:flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .row{display:grid;grid-template-columns:58px 1fr;gap:10px;margin:8px 0}
  .tm{font-size:12px;color:var(--muted);text-align:right;padding-top:13px;line-height:1.25}
  .blk{border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;
    border:1px solid transparent;transition:transform .15s ease}
  .blk i{font-size:22px;flex:none}
  .bt{font-size:15.5px;font-weight:600;margin:0}
  .bs{font-size:12.5px;margin:2px 0 0;opacity:.82}
  .health .blk{background:var(--health-bg);color:var(--health)}
  .logi   .blk{background:var(--logi-bg);color:var(--logi)}
  .work   .blk{background:var(--work-bg);color:var(--work)}
  .rest   .blk{background:var(--rest-bg);color:var(--rest)}
  .care   .blk{background:var(--care-bg);color:var(--care)}
  .now .blk{border-color:currentColor;box-shadow:0 0 0 3px color-mix(in srgb,currentColor 18%,transparent)}
  .now .tm{font-weight:700;color:var(--ink)}
  .comp{margin-left:auto;flex:none;width:34px;height:34px;border-radius:50%;border:1.5px solid currentColor;background:transparent;color:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.6;padding:0}
  .comp:hover,.comp:active{opacity:1;background:currentColor}
  .comp:hover i,.comp:active i{color:var(--card)}
  .row.done .blk{opacity:.55}
  .row.done .bt{text-decoration:line-through}
  .row.done .tm{font-size:20px;color:var(--health);padding-top:10px}
  .undo{margin-left:auto;flex:none;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;text-decoration:underline;padding:4px}
  .donehdr{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:20px 4px 8px;border-top:1px solid var(--line);padding-top:14px}
  .dayhdr{font-weight:600;font-size:14px;margin:16px 4px 8px;padding-top:12px;border-top:1px solid var(--line)}
  .dayhdr.first{border-top:none;padding-top:0;margin-top:4px}
  .emptyday{color:var(--muted);font-size:13px;margin:0 4px 6px}
  .weekrow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;margin:5px 0;background:var(--card);border:1px solid var(--line)}
  .weekrow .wt{font-size:12px;color:var(--muted);width:62px;flex:none}
  .weekrow i{font-size:18px;flex:none}
  .weekrow .wn{font-size:14px}
  .weekrow.health i{color:var(--health)} .weekrow.logi i{color:var(--logi)}
  .weekrow.work i{color:var(--work)} .weekrow.rest i{color:var(--rest)} .weekrow.care i{color:var(--care)}
  .bar{margin:14px 4px 0;text-align:center}
  .bar button{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px 16px;font-size:13px;cursor:pointer}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
  body.locked .wrap{display:none}
  #gate{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  body.locked #gate{display:flex}
  .gatebox{width:100%;max-width:320px;text-align:center}
  .gatebox i{font-size:34px;color:var(--health)}
  .gatebox h2{font-size:20px;font-weight:600;margin:14px 0 4px}
  .gatebox p{font-size:13.5px;color:var(--muted);margin:0 0 18px}
  #pw{width:100%;font-size:16px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);text-align:center}
  #pw:focus{outline:none;border-color:var(--health)}
  #go{width:100%;margin-top:10px;font-size:16px;font-weight:600;padding:12px;border:none;border-radius:12px;background:var(--health);color:#fff;cursor:pointer}
  #err{color:#c0392b;font-size:13px;min-height:18px;margin-top:10px}
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="gatebox">
    <i class="ti ti-lock"></i>
    <h2>My Day</h2>
    <p>Enter the password to view your schedule</p>
    <input id="pw" type="password" inputmode="text" autocomplete="off" placeholder="Password" />
    <button id="go">Unlock</button>
    <div id="err"></div>
  </div>
</div>
<div class="wrap">
  <header>
    <p class="eyebrow" id="dayEyebrow">Today</p>
    <h1 id="dayTitle">My Day</h1>
    <p class="clock"><i class="ti ti-clock"></i><span id="clock">—</span></p>
  </header>

  <div class="tabs">
    <button data-view="today" class="active">Today</button>
    <button data-view="tomorrow">Tomorrow</button>
    <button data-view="week">Week</button>
  </div>

  <div class="leg">
    <span><i class="dot" style="background:var(--health)"></i>Health</span>
    <span><i class="dot" style="background:var(--logi)"></i>Logistics</span>
    <span><i class="dot" style="background:var(--work)"></i>Work</span>
    <span><i class="dot" style="background:var(--care)"></i>Care</span>
    <span><i class="dot" style="background:var(--rest)"></i>Rest</span>
  </div>

  <div id="agenda"></div>

  <div class="bar" id="resetbarwrap"><button id="resetday">Reset today</button></div>
  <div class="bar" style="margin-top:10px"><button id="remind">Turn on reminders</button></div>

  <footer>My Day · open from your Home Screen icon for reminders</footer>
</div>

<script>
  var PW_HASH="7f912abfefacfcb55ed0a87dd25f2c471d52d9eeb9c08983b52585472e9319b4";
  var KEY="myday_unlocked_v1";
  function unlock(){document.body.classList.remove("locked");if(window.refresh)window.refresh();}
  async function sha256(s){
    var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
  }
  async function tryUnlock(){
    var pw=document.getElementById("pw").value;
    var err=document.getElementById("err");
    if(await sha256(pw)===PW_HASH){
      try{localStorage.setItem(KEY,"1");}catch(e){}
      unlock();
    } else { err.textContent="Wrong password — try again."; document.getElementById("pw").value=""; }
  }
  (function(){
    var remembered=false; try{remembered=localStorage.getItem(KEY)==="1";}catch(e){}
    if(remembered){unlock();}
    else{
      document.getElementById("go").addEventListener("click",tryUnlock);
      document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")tryUnlock();});
      document.getElementById("pw").focus();
    }
  })();
</script>
<script>
  var CFG=null, view='today', scrolled=false;
  var SKEY='myday_state_v2', state={};
  function loadState(){try{state=JSON.parse(localStorage.getItem(SKEY)||'{}')||{};}catch(e){state={};}}
  function saveState(){try{localStorage.setItem(SKEY,JSON.stringify(state));}catch(e){}}
  function mins(s){var p=String(s).split(':');return (+p[0])*60+(+p[1]);}
  function fmt(m){m=((m%1440)+1440)%1440;var h=Math.floor(m/60),mm=m%60,ap=h<12?'AM':'PM',h12=h%12||12;return {t:h12+':'+(mm<10?'0'+mm:mm),ap:ap};}
  function fmtFull(m){var f=fmt(m);return f.t+' '+f.ap;}
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function pad2(n){return n<10?'0'+n:''+n;}
  function dateForOffset(off){var d=new Date();d.setDate(d.getDate()+off);return d;}
  function dateStr(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
  var DOW=['sun','mon','tue','wed','thu','fri','sat'];
  var DOWLONG=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function slug(s){return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,24);}
  function mapItem(it){return {id:it.id||((it.cat||'x')+'-'+(it.time||'')+'-'+slug(it.title)),orig:mins(it.time),dur:it.dur||30,title:it.title||'',sub:it.sub||'',cat:it.cat||'rest',icon:it.icon||'ti-circle',fixed:!!it._fixed};}
  function byOrig(a,b){return a.orig-b.orig;}
  function appts(ds){return (CFG&&CFG.appointments&&CFG.appointments[ds])||[];}
  function tag(arr,def){return (arr||[]).map(function(it){var o={};for(var k in it)o[k]=it[k];o._fixed=(it.fixed!==undefined)?!!it.fixed:def;return o;});}
  function buildDay(d){
    if(!CFG)return [];
    var ds=dateStr(d),dk=DOW[d.getDay()];
    var raw=[].concat(tag(CFG.anchors,false),tag((CFG.weekly||{})[dk],false),tag(appts(ds),true));
    return raw.map(mapItem).sort(byOrig);
  }
  function computeStarts(active,completed,nm){
    var flex=active.filter(function(it){return !it.fixed;}).slice().sort(byOrig);
    var fix=active.filter(function(it){return it.fixed;});
    var lastFlow=null; for(var id in completed){var c=completed[id]; if(c!=null&&(lastFlow===null||c>lastFlow))lastFlow=c;}
    var cur=lastFlow!==null?lastFlow:(flex.length?flex[0].orig:0), out=[];
    flex.forEach(function(it){var s=cur,e=s+it.dur; if(nm>=e){s=nm;e=nm+it.dur;} cur=e; out.push({it:it,start:s});});
    fix.forEach(function(it){out.push({it:it,start:it.orig});});
    out.sort(function(a,b){return a.start-b.start;});
    return out;
  }

  function rowHtml(it,f,isNow,showBtn){
    return '<div class="row '+it.cat+(isNow?' now':'')+'"><div class="tm">'+f.t+'<br>'+f.ap+'</div>'+
      '<div class="blk"><i class="ti '+it.icon+'"></i><div><p class="bt">'+esc(it.title)+'</p><p class="bs">'+esc(it.sub)+'</p></div>'+
      (showBtn?'<button class="comp" data-id="'+it.id+'" aria-label="Mark complete"><i class="ti ti-check"></i></button>':'')+
      '</div></div>';
  }
  function doneRowHtml(it,doneMin){
    return '<div class="row '+it.cat+' done"><div class="tm"><i class="ti ti-check"></i></div>'+
      '<div class="blk"><i class="ti '+it.icon+'"></i><div><p class="bt">'+esc(it.title)+'</p><p class="bs">Done at '+fmtFull(doneMin)+'</p></div>'+
      '<button class="undo" data-id="'+it.id+'">undo</button></div></div>';
  }

  function renderLive(ag,DATA,ds,now){
    var nm=now.getHours()*60+now.getMinutes();
    var completed=state[ds]||{};
    var active=DATA.filter(function(it){return completed[it.id]==null;});
    var doneItems=DATA.filter(function(it){return completed[it.id]!=null;}).sort(function(a,b){return completed[a.id]-completed[b.id];});
    var html='';
    if(!DATA.length) html='<p class="emptyday" style="text-align:center;padding:16px 0">Nothing scheduled today.</p>';
    computeStarts(active,completed,nm).forEach(function(o){
      html+=rowHtml(o.it,fmt(o.start),(nm>=o.start&&nm<o.start+o.it.dur),true);
    });
    if(doneItems.length){ html+='<div class="donehdr">Completed</div>'; doneItems.forEach(function(it){html+=doneRowHtml(it,completed[it.id]);}); }
    ag.innerHTML=html;
    ag.querySelectorAll('.comp').forEach(function(b){b.addEventListener('click',function(){var n=new Date();(state[ds]=state[ds]||{})[b.dataset.id]=n.getHours()*60+n.getMinutes();saveState();syncState();render();});});
    ag.querySelectorAll('.undo').forEach(function(b){b.addEventListener('click',function(){if(state[ds])delete state[ds][b.dataset.id];saveState();syncState();render();});});
    if(!scrolled){var ne=ag.querySelector('.row.now');if(ne){ne.scrollIntoView({block:'center',behavior:'smooth'});scrolled=true;}}
  }
  function renderPlanned(ag,items){
    if(!items.length){ag.innerHTML='<p class="emptyday" style="text-align:center;padding:16px 0">Nothing scheduled.</p>';return;}
    var html=''; items.forEach(function(it){html+=rowHtml(it,fmt(it.orig),false,false);}); ag.innerHTML=html;
  }
  function renderWeek(ag){
    var html='';
    for(var off=0;off<7;off++){
      var d=dateForOffset(off),ds=dateStr(d);
      var label=(off===0?'Today':off===1?'Tomorrow':DOWLONG[d.getDay()])+' · '+MON[d.getMonth()]+' '+d.getDate();
      html+='<div class="dayhdr'+(off===0?' first':'')+'">'+label+'</div>';
      var items=(off<=1)?buildDay(d):appts(ds).map(mapItem).sort(byOrig);
      if(!items.length){ html+='<div class="emptyday">'+(off<=1?'Nothing scheduled':'No appointments')+'</div>'; }
      else items.forEach(function(it){var f=fmt(it.orig);html+='<div class="weekrow '+it.cat+'"><span class="wt">'+f.t+' '+f.ap+'</span><i class="ti '+it.icon+'"></i><span class="wn">'+esc(it.title)+'</span></div>';});
    }
    ag.innerHTML=html;
  }

  function render(){
    var now=new Date();
    var c=document.getElementById('clock'); if(c)c.textContent=now.toLocaleString([], {weekday:'short', hour:'numeric', minute:'2-digit'});
    document.querySelectorAll('.tabs button').forEach(function(b){b.classList.toggle('active',b.dataset.view===view);});
    var ag=document.getElementById('agenda'), reset=document.getElementById('resetbarwrap');
    if(!CFG){ ag.innerHTML='<p class="emptyday" style="text-align:center;padding:16px 0">Loading…</p>'; return; }
    if(view==='week'){ document.getElementById('dayEyebrow').textContent='Next 7 days'; document.getElementById('dayTitle').textContent='Your week'; if(reset)reset.style.display='none'; renderWeek(ag); return; }
    if(reset)reset.style.display='';
    var off=view==='tomorrow'?1:0, d=dateForOffset(off), live=off===0;
    document.getElementById('dayEyebrow').textContent=live?'Today':'Tomorrow';
    document.getElementById('dayTitle').textContent=DOWLONG[d.getDay()]+', '+MON[d.getMonth()]+' '+d.getDate();
    var items=buildDay(d);
    if(live) renderLive(ag,items,dateStr(d),now); else renderPlanned(ag,items);
  }
  window.refresh=render;

  // ---- push reminders ----
  var WORKER='https://myday-push.oevmcc.workers.dev';
  var VAPID='BJcKkLl5EQmr5qfjzEQsWrwqfHfZ7wOZ9A5Ceh_1n7VCUDDs-y4MKxpnPToqY6gEmiJt7NDTkhdMURmCv00xw3c';
  function uid(){return 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36);}
  function getLocalId(){var v=null;try{v=localStorage.getItem('myday_id');}catch(e){}if(!v){v=uid();try{localStorage.setItem('myday_id',v);}catch(e){}}return v;}
  function isSubbed(){try{return localStorage.getItem('myday_subbed')==='1';}catch(e){return false;}}
  function tzMin(){return -new Date().getTimezoneOffset();}
  function b64ToU8(s){s=s.replace(/-/g,'+').replace(/_/g,'/');var pad='='.repeat((4-s.length%4)%4);var raw=atob(s+pad);var u=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)u[i]=raw.charCodeAt(i);return u;}
  function idbSet(k,v){return new Promise(function(res){var o=indexedDB.open('myday',1);o.onupgradeneeded=function(){o.result.createObjectStore('kv');};o.onsuccess=function(){try{var tx=o.result.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=function(){res(true);};tx.onerror=function(){res(false);};}catch(e){res(false);}};o.onerror=function(){res(false);};});}
  function setRemindBtn(){var b=document.getElementById('remind');if(!b)return;if(isSubbed()){b.textContent='✓ Reminders on';b.disabled=true;}else{b.textContent='Turn on reminders';b.disabled=false;}}
  function syncState(){if(!isSubbed())return;var ds=dateStr(new Date());try{fetch(WORKER+'/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:getLocalId(),date:ds,completed:state[ds]||{},tz:tzMin()})});}catch(e){}}
  async function enableReminders(btn){
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){alert('This device can\'t do push here. On iPhone, open My Day from the Home Screen icon (not a browser tab), then try again.');return;}
    btn.disabled=true;btn.textContent='Setting up…';
    try{
      var reg=await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;
      var perm=await Notification.requestPermission();
      if(perm!=='granted'){alert('Notifications weren\'t allowed. Turn them on for My Day in Settings, then try again.');setRemindBtn();return;}
      var sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(VAPID)});
      var id=getLocalId(); await idbSet('id',id);
      var ds=dateStr(new Date());
      var r=await fetch(WORKER+'/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,subscription:sub,date:ds,completed:state[ds]||{},tz:tzMin()})});
      if(!r.ok)throw new Error('server '+r.status);
      try{localStorage.setItem('myday_subbed','1');}catch(e){}
      setRemindBtn();
      alert('Reminders are on! You\'ll get a heads-up 10 minutes before each item, plus a 7pm nudge to plan tomorrow.');
    }catch(e){alert('Couldn\'t turn on reminders: '+e.message);setRemindBtn();}
  }

  // ---- boot ----
  loadState();
  function boot(){
    fetch('schedule.json?t='+Date.now()).then(function(r){return r.json();}).then(function(j){
      CFG=j; try{localStorage.setItem('myday_cfg',JSON.stringify(j));}catch(e){} render();
    }).catch(function(){ try{CFG=JSON.parse(localStorage.getItem('myday_cfg'));}catch(e){} render(); });
  }
  boot();
  setInterval(function(){ if(view==='today') render(); },30000);
  document.querySelectorAll('.tabs button').forEach(function(b){b.addEventListener('click',function(){view=b.dataset.view;scrolled=false;render();});});
  setRemindBtn();
  document.getElementById('remind').addEventListener('click',function(){enableReminders(this);});
  document.getElementById('resetday').addEventListener('click',function(){var ds=dateStr(new Date());if(confirm('Reset today? This clears completed items for today.')){state[ds]={};saveState();syncState();scrolled=false;render();}});
</script>
</body>
</html>
